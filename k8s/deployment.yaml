apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-grup13
  namespace: grup13
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-grup13
      type: frontend
  template:
    metadata:
      labels:
        app: web-grup13
        type: frontend
    spec:
      imagePullSecrets:
      - name: regcred
      containers:
      - name: frontend
        image: kube0.lacetania.cat/grup13/frontend:latest
        imagePullPolicy: Always
        resources:
          requests:
            memory: "150Mi"
            cpu: "100m"
          limits:
            memory: "250Mi"
            cpu: "200m"
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: clusterip-grup13
  namespace: grup13
spec:
  type: ClusterIP
  selector:
    app: web-grup13
    type: frontend
  ports:
  - port: 80
    targetPort: 80
  clusterIP: 10.96.13.101
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-grup13
  namespace: grup13
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-grup13
      type: backend
  template:
    metadata:
      labels:
        app: api-grup13
        type: backend
    spec:
      imagePullSecrets:
      - name: regcred
      containers:
      - name: backend
        image: kube0.lacetania.cat/grup13/backend:latest
        imagePullPolicy: Always
        resources:
          requests:
            memory: "200Mi"
            cpu: "150m"
          limits:
            memory: "400Mi"
            cpu: "300m"
        ports:
        - containerPort: 80
        env:
        - name: DB_CONNECTION
          value: "mysql"
        - name: DB_HOST
          value: "mariadb-service"
        - name: DB_PORT
          value: "3306"
        - name: DB_DATABASE
          value: "eventai_db"
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: db-username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: db-password
        - name: APP_KEY
          valueFrom:
            secretKeyRef:
              name: backend-secrets
              key: app-key
        - name: AI_SERVICE_URL
          value: "http://ai-service:5000"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 60
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: grup13
spec:
  selector:
    app: ai-grup13
    type: microservice
  ports:
  - port: 5000
    targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-grup13
  namespace: grup13
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-grup13
      type: microservice
  template:
    metadata:
      labels:
        app: ai-grup13
        type: microservice
    spec:
      imagePullSecrets:
      - name: regcred
      containers:
      - name: ai-service
        image: kube0.lacetania.cat/grup13/ai-service:latest
        resources:
          requests:
            memory: "150Mi"
            cpu: "100m"
          limits:
            memory: "250Mi"
            cpu: "200m"
        ports:
        - containerPort: 5000
        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 30
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 15
          periodSeconds: 10
